<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engineering Calculator</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <div class="left-panel">
      <div class="phrase-3d" data-text="ЗРЯ Я НЕ ПОСТУПИЛ В МФТИ">
        <span>ЗРЯ</span>
        <span>Я</span>
        <span>НЕ</span>
        <span>ПОСТУПИЛ</span>
        <span>В</span>
        <span>МФТИ</span>
      </div>
    </div>
    <div class="calculator">
      <div class="display">
        <div class="display-title">ENGINEERING CALC</div>
        <div class="display-status">
          <span id="mem-ind" class="mem-badge">M</span>
          <span id="mode" class="mode-badge">DEG</span>
        </div>
        <div id="expression" class="expr"></div>
        <div id="result" class="result">0</div>
      </div>
      <div id="buttons" class="btn-grid"></div>
      <div class="theme-bar">
        <button class="theme-mode-btn" id="btn-theme" title="Светлая / тёмная тема">🌙</button>
        <span class="theme-label">Цвет</span>
        <div class="swatches">
          <button class="swatch active" data-color="space"  style="background:#4466ff" title="Space"></button>
          <button class="swatch"        data-color="forest" style="background:#22cc44" title="Forest"></button>
          <button class="swatch"        data-color="sunset" style="background:#ff6622" title="Sunset"></button>
          <button class="swatch"        data-color="ocean"  style="background:#22ccee" title="Ocean"></button>
          <button class="swatch"        data-color="violet" style="background:#9922ff" title="Violet"></button>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="tabs">
        <button class="tab active" data-tab="history">История</button>
        <button class="tab" data-tab="graph">График</button>
      </div>

      <div class="tab-content" id="tab-history">
        <div class="history-header">
          <button id="clear-history">Очистить</button>
        </div>
        <div class="history-list" id="history-list">
          <div class="history-empty">Нет записей</div>
        </div>
      </div>

      <div class="tab-content hidden" id="tab-graph">
        <div class="graph-controls">
          <input id="fn-input" type="text" value="sin(x)" placeholder="f(x) = ..." spellcheck="false">
          <button id="btn-plot">Построить</button>
        </div>
        <div class="graph-wrap">
          <canvas id="graph-canvas"></canvas>
        </div>
        <div class="graph-hint">колёсико — zoom · перетащить — пан</div>
        <div class="graph-error" id="graph-error"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/calculator.ts"></script>
</body>
</html>
